services:
  postgres:
    image: postgres:16-alpine
    container_name: scriba-postgres
    environment:
      POSTGRES_DB: scriba
      POSTGRES_USER: scriba
      POSTGRES_PASSWORD: scriba
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: scriba-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: scriba-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: scriba
      MINIO_ROOT_PASSWORD: scriba123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data
